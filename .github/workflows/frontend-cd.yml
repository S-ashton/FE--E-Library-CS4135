name: Frontend Container (Manual)

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: frontend-manual-container
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/e-library-frontend
  # Uses repo variable if provided; otherwise falls back to local-style API URL.
  DEV_API_BASE_URL: ${{ vars.DEV_VITE_API_BASE_URL || 'http://localhost:8080/api' }}

jobs:
  verify-and-build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build app
        env:
          VITE_API_BASE_URL: ${{ env.DEV_API_BASE_URL }}
        run: npm run build

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ env.DEV_API_BASE_URL }}" \
            -t "${{ env.IMAGE_NAME }}:local-${{ github.sha }}" \
            -t "${{ env.IMAGE_NAME }}:develop" .

      - name: Log in to GHCR
        if: ${{ inputs.push_image == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ inputs.push_image == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.DEV_API_BASE_URL }}
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:develop
